apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yandex-messenger-bridge.fullname" . }}
  labels:
    {{- include "yandex-messenger-bridge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "yandex-messenger-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "yandex-messenger-bridge.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: DATABASE_DSN
              value: {{ include "yandex-messenger-bridge.databaseDsn" . | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "yandex-messenger-bridge.fullname" . }}
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "yandex-messenger-bridge.fullname" . }}
                  key: ENCRYPTION_KEY
          envFrom:
            - configMapRef:
                name: {{ include "yandex-messenger-bridge.fullname" . }}
          resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}