{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "yandex-messenger-bridge.fullname" . }}-migrations
  labels:
    {{- include "yandex-messenger-bridge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/integrator"]
          args: ["-migrate"]
          env:
            - name: DATABASE_DSN
              value: {{ include "yandex-messenger-bridge.databaseDsn" . | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "yandex-messenger-bridge.fullname" . }}
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "yandex-messenger-bridge.fullname" . }}
                  key: ENCRYPTION_KEY
          envFrom:
            - configMapRef:
                name: {{ include "yandex-messenger-bridge.fullname" . }}
          resources:
          {{- toYaml .Values.resources | nindent 10 }}
{{- end }}